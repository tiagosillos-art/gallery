<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste - Bolha com Oitavas e Reflexo</title>
  <link rel="stylesheet" href="./bubble.css" />
</head>
<body>
  <div class="bg-glow glow-a"></div>
  <div class="bg-glow glow-b"></div>
  <div class="bg-glow glow-c"></div>

  <canvas id="webgl"></canvas>

  <div id="panel">
    <h1>teste da bolha</h1>
    <p class="sub">1 bolha só, com oitavas no volume e reflexo forte inspirado no modelo liquid glass.</p>

    <div class="group">
      <div class="row"><label for="octaves">oitavas</label><span id="octavesVal"></span></div>
      <input id="octaves" type="range" min="1" max="6" step="1" value="5" />

      <div class="row"><label for="displacement">volume orgânico</label><span id="displacementVal"></span></div>
      <input id="displacement" type="range" min="0.00" max="0.22" step="0.005" value="0.095" />

      <div class="row"><label for="filmStrength">iridescência</label><span id="filmStrengthVal"></span></div>
      <input id="filmStrength" type="range" min="0.00" max="1.50" step="0.01" value="0.92" />

      <div class="row"><label for="reflectionBoost">reflexo</label><span id="reflectionBoostVal"></span></div>
      <input id="reflectionBoost" type="range" min="0.20" max="2.50" step="0.01" value="1.55" />
    </div>

    <div class="hint">mouse move a luz e a bolha. esta versão é só um laboratório visual isolado.</div>
  </div>

  <script type="module" src="./bubble-scene.js"></script>
</body>
</html>
