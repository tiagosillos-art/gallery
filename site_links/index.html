<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Infinite 4‑Way Parallax Gallery | Three.js</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div id="container"></div>
<div id="loading">Chargement des images...</div>
<div id="ui" class="hint" style="display:none;">Photos de <a href="https://unsplash.com/fr/@irisavi?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText" target="_blank" rel="noopener nofollow">IRIS AVI</a> sur <a href="https://unsplash.com/fr/photos/une-femme-se-pare-de-rose-avec-des-accents-floraux-XHhh2Rsp89A?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText" target="_blank" rel="noopener nofollow">Unsplash</a>
</div>
<div class="copy">&Toc</div>

<div class="help-button" id="helpButton">?</div>

<div class="modal" id="helpModal">
	<div class="modal-content">
		<div class="modal-header">
			<h2 id="modalTitle">How to use the gallery.</h2>
			<span class="modal-close" id="modalClose">&times;</span>
		</div>
		<div class="modal-body">
			<div class="instruction">
				<div class="instruction-item">
					<div class="instruction-icon"></div>
					<div class="instruction-text">
						<strong id="scrollTitle">Scroll</strong>
						<span id="scrollText">Use the mouse wheel to scroll through the images.</span>
					</div>
				</div>
				<div class="instruction-item">
					<div class="instruction-icon"></div>
					<div class="instruction-text">
						<strong id="dragTitle">Drag & Drop</strong>
						<span id="dragText">A small horizontal drag reduces scrolling speed and reverses direction.</span>
					</div>
				</div>
				<div class="instruction-item">
					<div class="instruction-icon"></div>
					<div class="instruction-text">
						<strong id="doubleClickTitle">Double-click</strong>
						<span id="doubleClickText">Double-click changes the layer order and image size.</span>
					</div>
				</div>
			</div>

		</div>
		<div class="modal-footer">
			<div class="lang-buttons">
				<button class="lang-btn" data-lang="fr">Français</button>
				<button class="lang-btn" data-lang="en">English</button>
				<button class="lang-btn" data-lang="es">Español</button>
			</div>
			<button class="close-btn" id="closeModalBtn">Close</button>
		</div>
	</div>
</div>

<script>
	(function() {
		const translations = {
			fr: {
				title: "Comment utiliser la galerie",
				scrollTitle: "Scroll",
				scrollText: "Utilisez la molette de la souris pour faire défiler les images.",
				dragTitle: "Drag & Glisser",
				dragText: "Un petit drag horizontal permet de réduire la vitesse de défilement et d'inverser le sens.",
				doubleClickTitle: "Double-clic",
				doubleClickText: "Un double-clic modifie l'ordre des layers et la taille des images.",
				closeBtn: "Fermer"
			},
			en: {
				title: "How to use the gallery",
				scrollTitle: "Scroll",
				scrollText: "Use the mouse wheel to scroll through the images.",
				dragTitle: "Drag & Drop",
				dragText: "A small horizontal drag reduces scrolling speed and reverses direction.",
				doubleClickTitle: "Double-click",
				doubleClickText: "Double-click changes the layer order and image size.",
				closeBtn: "Close"
			},
			es: {
				title: "Cómo usar la galería",
				scrollTitle: "Desplazar",
				scrollText: "Usa la rueda del mouse para desplazarte por las imágenes.",
				dragTitle: "Arrastrar",
				dragText: "Un pequeño arrastre horizontal reduce la velocidad de desplazamiento e invierte la dirección.",
				doubleClickTitle: "Doble clic",
				doubleClickText: "El doble clic cambia el orden de las capas y el tamaño de las imágenes.",
				closeBtn: "Cerrar"
			}
		};
		let currentLang = 'en';
		const savedLang = localStorage.getItem('galleryHelpLanguage');
		if (savedLang && translations[savedLang]) {
			currentLang = savedLang
		} else {
			const browserLang = navigator.language.substring(0, 2);
			if (translations[browserLang]) {
				currentLang = browserLang
			}
		}

		function applyTranslation(lang) {
			const trans = translations[lang];
			if (!trans) return;
			document.getElementById('modalTitle').textContent = trans.title;
			document.getElementById('scrollTitle').textContent = trans.scrollTitle;
			document.getElementById('scrollText').textContent = trans.scrollText;
			document.getElementById('dragTitle').textContent = trans.dragTitle;
			document.getElementById('dragText').textContent = trans.dragText;
			document.getElementById('doubleClickTitle').textContent = trans.doubleClickTitle;
			document.getElementById('doubleClickText').textContent = trans.doubleClickText;
			document.getElementById('closeModalBtn').textContent = trans.closeBtn
		}

		function updateActiveButton(lang) {
			const buttons = document.querySelectorAll('.lang-btn');
			buttons.forEach(btn => {
				btn.classList.remove('active');
				if (btn.getAttribute('data-lang') === lang) {
					btn.classList.add('active')
				}
			})
		}

		function setLanguage(lang) {
			currentLang = lang;
			localStorage.setItem('galleryHelpLanguage', lang);
			applyTranslation(lang);
			updateActiveButton(lang)
		}
		const helpButton = document.getElementById('helpButton');
		const helpModal = document.getElementById('helpModal');
		const modalClose = document.getElementById('modalClose');
		const closeModalBtn = document.getElementById('closeModalBtn');
		const langButtons = document.querySelectorAll('.lang-btn');

		function openModal() {
			if (helpModal) {
				helpModal.style.display = 'flex'
			}
		}

		function closeModal() {
			if (helpModal) {
				helpModal.style.display = 'none'
			}
		}
		if (helpButton) {
			helpButton.addEventListener('click', openModal)
		}
		if (modalClose) {
			modalClose.addEventListener('click', closeModal)
		}
		if (closeModalBtn) {
			closeModalBtn.addEventListener('click', closeModal)
		}
		if (helpModal) {
			helpModal.addEventListener('click', function(e) {
				if (e.target === helpModal) {
					closeModal()
				}
			})
		}
		if (langButtons.length > 0) {
			langButtons.forEach(btn => {
				btn.addEventListener('click', () => {
					const lang = btn.getAttribute('data-lang');
					setLanguage(lang)
				})
			})
		}
		document.addEventListener('keydown', function(e) {
			if (e.key === 'Escape' && helpModal && helpModal.style.display === 'flex') {
				closeModal()
			}
		});
		applyTranslation(currentLang);
		updateActiveButton(currentLang)
	})()
</script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js'></script><script  src="./script.js"></script>

  </body>
  
</html>
