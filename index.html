<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiago Sillos | Galeria de Arte</title>
    <style>
        /* Estilo Minimalista */
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; background-color: #f9f9f9; color: #333; line-height: 1.6; }
        header { padding: 50px 20px; text-align: center; background: #fff; border-bottom: 1px solid #eee; }
        h1 { font-weight: 300; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        p.subtitle { color: #888; font-style: italic; margin-top: 5px; }
        
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        
        /* Grade da Galeria */
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .art-card { background: #fff; padding: 15px; border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.3s ease; }
        .art-card:hover { transform: translateY(-5px); }
        .art-card img { width: 100%; height: auto; display: block; border-radius: 2px; }
        .art-info { padding: 15px 0 5px; text-align: center; }
        .art-title { font-weight: bold; display: block; }
        .art-tech { font-size: 0.9em; color: #666; }
        
        /* Rodapé e Contato */
        footer { text-align: center; padding: 60px 20px; background: #fff; margin-top: 50px; border-top: 1px solid #eee; }
        .btn-contato { display: inline-block; padding: 12px 25px; background: #333; color: #fff; text-decoration: none; border-radius: 30px; margin-top: 20px; transition: background 0.3s; }
        .btn-contato:hover { background: #555; }
    </style>
</head>
<body>

<header>
    <h1>Tiago Sillos Padovani</h1>
    <p class="subtitle">Arquiteto & Artista Plástico</p>
</header>

<div class="container">
    <div class="gallery">
        
        <div class="art-card">
            <img src="obra1.jpg" alt="Pintura Óleo Tiago Sillos">
            <div class="art-info">
                <span class="art-title">Título da Obra 01</span>
                <span class="art-tech">Óleo e Giz Pastel sobre tela</span>
            </div>
        </div>

        <div class="art-card">
            <img src="obra2.jpg" alt="Escultura Tiago Sillos">
            <div class="art-info">
                <span class="art-title">Título da Obra 02</span>
                <span class="art-tech">Escultura Metálica / Técnica Mista</span>
            </div>
        </div>

        <div class="art-card">
            <img src="obra3.jpg" alt="Fluxos Orgânicos Primordiais">
            <div class="art-info">
                <span class="art-title">Fluxos Orgânicos Primordiais</span>
                <span class="art-tech">Técnica Mista sobre Tela</span>
            </div>
        </div>

    </div>
</div>

<footer>
    <p>Interessado em adquirir uma obra ou e-book?</p>
    <a href="mailto:seu-email@dominio.com" class="btn-contato">Entrar em Contato</a>
    <p style="margin-top: 30px; font-size: 0.8em; color: #aaa;">&copy; 2026 tiagosillos.art.br</p>
</footer>

</body>
</html>
